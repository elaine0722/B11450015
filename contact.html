<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amici</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <div class="logo">
            <h1><img src="images/logo.webp" alt="">Amici</h1>
    </div>
    <nav class="navigation">
        <ul>
            <li><a href="Home.html"><span>Home</span></a></li>
            <li><a href="About.html"><span>About Us</span></a></li>
            <li><a href="MENU.html"><span>Menu</span></a></li>
            <li><a href="Gallery.html"><span>Gallery</span></a></li>
            <li class="active"><a href="contact.html"><span>Contact</span></a></li>
        </ul>
    </nav>
</header>

    <main class="contact-page">
    <!-- 頂部引言 -->
    <section class="contact-intro">
        <h2>預約您的義式時光</h2>
        <p class="lead">無論是浪漫約會還是好友聚餐，Amici 都為您準備好了最溫馨的角落。</p>
    </section>

    <section class="contact-container">
        <!-- 左側：聯絡資訊與地圖 -->
        <div class="contact-info">
            <div class="info-item">
                <h3>📍 門市地址</h3>
                <p>台北市大安區義式浪漫路 77 號 (近捷運忠孝復興站)</p>
            </div>
            <div class="info-item">
                <h3>📞 聯絡電話</h3>
                <p>(02) 2345-6789</p>
            </div>
            <div class="info-item">
                <h3>⏰ 營業時間</h3>
                <p>週一至週日 11:30 - 14:30 / 17:30 - 22:00</p>
            </div>
            <!-- 模擬地圖區塊 -->
            <div class="map-box">
                <img src="https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=600&q=80" alt="Amici 地點示意圖">
            </div>
        </div>

        <!-- 右側：預約表單 -->
        <div class="contact-form">
            <form action="#">
                <div class="form-group">
                    <label>您的姓名</label>
                    <input type="text" placeholder="例如：王小明" required>
                </div>
                <div class="form-group">
                    <label>聯絡電話</label>
                    <input type="tel" placeholder="0912-345-678" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>預約日期</label>
                        <input type="date" required>
                    </div>
                    <div class="form-group">
                        <label>人數</label>
                        <input type="number" min="1" max="20" value="2" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>備註事項</label>
                    <textarea rows="4" placeholder="如有過敏食材或特殊節日慶祝請告知我們"></textarea>
                </div>
                <button type="submit" class="submit-btn">送出預約</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
